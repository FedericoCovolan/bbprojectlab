<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#E8193C">
    <title>BB Project Lab - Customizer</title>
    <style>
        :root {
            --red: #E8193C;
            --white: #FFFFFF;
            --pink: #FFB3D1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--red);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            color: var(--white);
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .screen {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            padding: 24px;
            padding-top: max(40px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }

        .screen.active { display: flex; }

        .title {
            font-size: 46px;
            font-weight: 900;
            line-height: 0.85;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 13px;
            font-weight: 700;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Anteprima Capo */
        .preview-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .product-svg {
            width: 100%;
            max-width: 340px; /* Capo più grande */
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.2));
        }

        /* Opzioni */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .option-card.selected {
            background: var(--white);
            color: var(--red);
            transform: scale(1.03);
        }

        .option-card svg {
            width: 60px;
            height: 60px;
        }

        .option-label {
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Navigazione */
        .nav-group {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 8px;
        }

        .back-link {
            font-size: 13px;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            padding: 4px 0;
            align-self: flex-start;
            text-transform: lowercase;
            transition: color 0.2s;
        }

        .back-link:hover, .back-link:active {
            color: var(--white);
            text-decoration: underline;
        }

        .btn-primary {
            width: 100%;
            background: var(--white);
            color: var(--red);
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary:disabled { opacity: 0.3; }

        .progress-dots {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 15px;
        }

        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); }
        .dot.active { background: var(--white); width: 16px; border-radius: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active .preview-area { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body>

<div class="app-container">

    <div class="screen active" id="s0">
        <div style="margin-top: 20px;">
            <h1 class="title">BB<br>PROJECT<br>LAB</h1>
            <p class="subtitle">per tette stellari ★</p>
        </div>
        <div class="preview-area">
            <svg class="product-svg" viewBox="0 0 200 200">
                <path d="M40,40 Q100,20 160,40 L165,170 Q100,185 35,170 Z" fill="white"/>
                <text x="75" y="100" font-size="30" text-anchor="middle" fill="#E8193C">★</text>
                <text x="125" y="100" font-size="30" text-anchor="middle" fill="#E8193C">★</text>
            </svg>
        </div>
        <button class="btn-primary" onclick="go('s1')">Crea la tua maglia</button>
    </div>

    <div class="screen" id="s1">
        <h1 class="title">CHE CAPO<br>VUOI?</h1>
        <div class="preview-area"></div> 
        <div class="options-grid">
            <div class="option-card" onclick="sel('garment', 'tshirt', this)">
                <svg viewBox="0 0 100 100">
                    <path d="M20,25 Q50,15 80,25 L85,45 L70,45 L70,85 L30,85 L30,45 L15,45 Z" fill="currentColor"/>
                    <path d="M40,23 Q50,32 60,23" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="2"/>
                </svg>
                <span class="option-label">T-Shirt</span>
            </div>
            <div class="option-card" onclick="sel('garment', 'rib', this)">
                <svg viewBox="0 0 100 100">
                    <path d="M35,15 Q50,12 65,15 L68,85 L32,85 Z" fill="currentColor"/>
                    <path d="M35,15 L32,85 M40,15 L38,85 M45,14 L44,85 M55,14 L56,85 M60,15 L62,85" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>
                </svg>
                <span class="option-label">Canotta Rib</span>
            </div>
            <div class="option-card" style="grid-column: span 2;" onclick="sel('garment', 'top', this)">
                <svg viewBox="0 0 100 100">
                    <line x1="38" y1="15" x2="40" y2="35" stroke="currentColor" stroke-width="2"/>
                    <line x1="62" y1="15" x2="60" y2="35" stroke="currentColor" stroke-width="2"/>
                    <path d="M30,35 Q50,45 70,35 L75,85 L25,85 Z" fill="currentColor"/>
                </svg>
                <span class="option-label">Top a Bretelle</span>
            </div>
        </div>
        <div class="nav-group">
            <a class="back-link" onclick="go('s0')">torna indietro</a>
            <button class="btn-primary" id="btn-s1" disabled onclick="go('s2')">avanti</button>
        </div>
    </div>

    <div class="screen" id="s2">
        <h1 class="title">IL<br>TESSUTO</h1>
        <div class="preview-area"></div>
        <div class="options-grid">
            <div class="option-card" onclick="sel('fabric', 'cotone', this)">
                <div style="width:40px;height:40px;background:#fff;border-radius:8px;"></div>
                <span class="option-label">Cotone</span>
            </div>
            <div class="option-card" onclick="sel('fabric', 'raso', this)">
                <div style="width:40px;height:40px;background:linear-gradient(135deg,#fff,#f0f0f0);border-radius:8px;box-shadow:inset -2px -2px 5px rgba(0,0,0,0.05)"></div>
                <span class="option-label">Raso</span>
            </div>
            <div class="option-card" onclick="sel('fabric', 'velluto', this)">
                <div style="width:40px;height:40px;background:#f8f8f8;border-radius:8px;border:1px solid #eee"></div>
                <span class="option-label">Velluto</span>
            </div>
            <div class="option-card" onclick="sel('fabric', 'pizzo', this)">
                <div style="width:40px;height:40px;background:white;border-radius:8px;border:1px dashed #ccc"></div>
                <span class="option-label">Pizzo</span>
            </div>
        </div>
        <div class="nav-group">
            <a class="back-link" onclick="go('s1')">torna indietro</a>
            <button class="btn-primary" id="btn-s2" disabled onclick="go('s3')">avanti</button>
        </div>
    </div>

    <div class="screen" id="s3">
        <h1 class="title">COLORE<br>STELLE</h1>
        <div class="preview-area"></div>
        <div class="options-grid">
            <div class="option-card" onclick="sel('beads', 'oro', this)">
                <div style="width:36px;height:36px;background:#FFD700;border-radius:50%;box-shadow:0 4px 10px rgba(0,0,0,0.1)"></div>
                <span class="option-label">Oro</span>
            </div>
            <div class="option-card" onclick="sel('beads', 'argento', this)">
                <div style="width:36px;height:36px;background:#D0D0D0;border-radius:50%;box-shadow:0 4px 10px rgba(0,0,0,0.1)"></div>
                <span class="option-label">Argento</span>
            </div>
            <div class="option-card" onclick="sel('beads', 'rosa', this)">
                <div style="width:36px;height:36px;background:#FFB3D1;border-radius:50%;box-shadow:0 4px 10px rgba(0,0,0,0.1)"></div>
                <span class="option-label">Rosa</span>
            </div>
            <div class="option-card" onclick="sel('beads', 'multi', this)">
                <div style="width:36px;height:36px;background:linear-gradient(45deg,#ff2400,#ff8000,#ffff00,#00ff00,#0000ff);border-radius:50%"></div>
                <span class="option-label">Multi</span>
            </div>
        </div>
        <div class="nav-group">
            <a class="back-link" onclick="go('s2')">torna indietro</a>
            <button class="btn-primary" id="btn-s3" disabled onclick="renderResult()">concludi ★</button>
        </div>
    </div>

    <div class="screen" id="s4">
        <h1 class="title">ECCO IL<br>TUO LAB</h1>
        <div class="preview-area" id="final-svg"></div>
        <div class="nav-group">
            <button class="btn-primary" onclick="location.reload()">Ricomincia</button>
        </div>
    </div>

</div>

<script>
    let choices = { garment: '', fabric: '', beads: '' };

    function go(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function sel(type, val, el) {
        choices[type] = val;
        el.parentElement.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        document.getElementById('btn-' + el.closest('.screen').id).disabled = false;
    }

    function renderResult() {
        const paths = {
            tshirt: 'M30,35 Q100,20 170,35 L175,70 L155,70 L155,180 L45,180 L45,70 L25,70 Z',
            rib: 'M65,25 Q100,20 135,25 L145,180 L55,180 Z',
            top: 'M70,20 L72,55 L128,55 L130,20 M50,55 L150,55 L160,180 L40,180 Z'
        };

        const colors = { oro: '#FFD700', argento: '#E0E0E0', rosa: '#FFB3D1', multi: 'url(#gradMulti)' };
        
        let fill = 'white';
        if(choices.fabric === 'raso') fill = 'url(#gradRaso)';
        if(choices.fabric === 'pizzo') fill = 'url(#patternPizzo)';

        const svg = `
            <svg class="product-svg" viewBox="0 0 200 200">
                <defs>
                    <linearGradient id="gradRaso" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ffffff" />
                        <stop offset="100%" stop-color="#f0f0f0" />
                    </linearGradient>
                    <linearGradient id="gradMulti" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#ff0000" /><stop offset="50%" stop-color="#00ff00" /><stop offset="100%" stop-color="#0000ff" />
                    </linearGradient>
                    <pattern id="patternPizzo" width="10" height="10" patternUnits="userSpaceOnUse">
                        <circle cx="5" cy="5" r="2" fill="none" stroke="#eee" stroke-width="0.5"/>
                    </pattern>
                </defs>
                <path d="${paths[choices.garment]}" fill="${fill}" />
                <text x="75" y="110" font-size="28" text-anchor="middle" fill="${colors[choices.beads]}">★</text>
                <text x="125" y="110" font-size="28" text-anchor="middle" fill="${colors[choices.beads]}">★</text>
            </svg>
        `;
        document.getElementById('final-svg').innerHTML = svg;
        go('s4');
    }
</script>
</body>
</html>
